pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    // Expo SDK 53 ships `expo-module-gradle-plugin` (required by expo-asset/file-system).
    // Make it resolvable as a settings-included build.
    includeBuild(new File(["node", "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim(), "../android/expo-gradle-plugin").absolutePath)
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id("com.facebook.react.settings")
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories {
        google()
        mavenCentral()
    }
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  def command = [
    'node',
    '--no-warnings',
    '--eval',
    'require(require.resolve(\'expo-modules-autolinking\', { paths: [require.resolve(\'expo/package.json\')] }))(process.argv.slice(1))',
    'react-native-config',
    '--json',
    '--platform',
    'android'
  ].toList()
  ex.autolinkLibrariesFromCommand(command)
}

rootProject.name = "Scribend"
include(":app")
includeBuild("../node_modules/@react-native/gradle-plugin")

apply from: new File(["node", "--print", "require.resolve('expo/package.json')"].execute(null, rootDir).text.trim(), "../scripts/autolinking.gradle")
useExpoModules()